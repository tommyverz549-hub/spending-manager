<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendManager95 v1.1</title>
    <style>
        /* 90s Operating System Color Palette & Micro-fonts */
        :root {
            --win-bg: #c0c0c0;
            --win-edge-light: #fff;
            --win-edge-shadow: #808080;
            --win-edge-dark: #000;
            --title-blue: #000080;
            --title-text: #fff;
            --input-bg: #fff;
        }

        * {
            box-sizing: border-box;
            font-family: "MS Sans Serif", "Courier New", monospace;
            font-size: 14px;
        }

        body {
            background-color: #008080;
            /* Classic Teal Desktop */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* The Application Window (Beveled Edges) */
        .window {
            background-color: var(--win-bg);
            width: 400px;
            padding: 3px;
            border-top: 2px solid var(--win-edge-light);
            border-left: 2px solid var(--win-edge-light);
            border-right: 2px solid var(--win-edge-dark);
            border-bottom: 2px solid var(--win-edge-dark);
            box-shadow: 1px 1px 0px var(--win-edge-shadow);
        }

        /* Classic Blue Title Bar */
        .title-bar {
            background: linear-gradient(90deg, var(--title-blue), #1084d0);
            color: var(--title-text);
            padding: 4px 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .title-bar-controls button {
            background-color: var(--win-bg);
            border-top: 1px solid var(--win-edge-light);
            border-left: 1px solid var(--win-edge-light);
            border-right: 2px solid var(--win-edge-dark);
            border-bottom: 2px solid var(--win-edge-dark);
            font-weight: bold;
            padding: 1px 4px;
            cursor: pointer;
        }

        .window-body {
            padding: 15px;
        }

        .field-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .inline-fields {
            display: flex;
            gap: 8px;
        }

        .inline-fields>div {
            flex: 1;
        }

        label {
            margin-bottom: 4px;
        }

        /* Inset inputs (sunken look) */
        input[type="date"],
        input[type="number"],
        input[type="text"],
        select.win-select {
            padding: 4px;
            background-color: var(--input-bg);
            border-top: 2px solid var(--win-edge-dark);
            border-left: 2px solid var(--win-edge-dark);
            border-right: 2px solid var(--win-edge-light);
            border-bottom: 2px solid var(--win-edge-light);
            outline: none;
            width: 100%;
        }

        select.win-select {
            font-size: 13px;
            height: 25px;
        }

        /* Outset Buttons (raised look) */
        button.win-btn {
            width: 100%;
            padding: 6px;
            background-color: var(--win-bg);
            border-top: 2px solid var(--win-edge-light);
            border-left: 2px solid var(--win-edge-light);
            border-right: 2px solid var(--win-edge-dark);
            border-bottom: 2px solid var(--win-edge-dark);
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        button.win-btn:active {
            border-top: 2px solid var(--win-edge-dark);
            border-left: 2px solid var(--win-edge-dark);
            border-right: 2px solid var(--win-edge-light);
            border-bottom: 2px solid var(--win-edge-light);
            padding: 7px 5px 5px 7px;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--win-edge-shadow);
            border-bottom: 1px solid var(--win-edge-light);
            margin: 15px 0;
        }

        /* Database Log View */
        .log-container {
            background: var(--input-bg);
            border-top: 2px solid var(--win-edge-dark);
            border-left: 2px solid var(--win-edge-dark);
            border-right: 2px solid var(--win-edge-light);
            border-bottom: 2px solid var(--win-edge-light);
            height: 180px;
            overflow-y: auto;
            padding: 5px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px dashed #d0d0d0;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .delete-btn {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            font-weight: bold;
        }

        .status-box {
            background: #fff;
            border-top: 2px solid var(--win-edge-dark);
            border-left: 2px solid var(--win-edge-dark);
            border-right: 2px solid var(--win-edge-light);
            border-bottom: 2px solid var(--win-edge-light);
            padding: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #000080;
        }

        /* Chart Components */
        .chart-container {
            background: #fff;
            border-top: 2px solid var(--win-edge-dark);
            border-left: 2px solid var(--win-edge-dark);
            border-right: 2px solid var(--win-edge-light);
            border-bottom: 2px solid var(--win-edge-light);
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px;
            gap: 4px;
        }

        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar {
            width: 100%;
            background: linear-gradient(to right, #000080, #1084d0);
            border-top: 1px solid var(--win-edge-light);
            border-left: 1px solid var(--win-edge-light);
            border-right: 1px solid var(--win-edge-dark);
            transition: height 0.3s ease;
            min-height: 2px;
        }

        .chart-label {
            font-size: 9px;
            margin-top: 4px;
            text-align: center;
        }

        .window-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 400px;
        }
    </style>
</head>

<body>

    <!-- MAIN WORKSTATION WINDOW -->
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">📁 SpendManager v1.1</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize">_</button>
                <button aria-label="Maximize">?</button>
                <button aria-label="Close" onclick="alert('System cannot be closed!')">X</button>
            </div>
        </div>

        <div class="window-body">
            <div class="field-row">
                <label for="date-input">Target Processing Date:</label>
                <input id="date-input" type="date" onchange="loadLedger()">
            </div>

            <div class="field-row">
                <label for="item-input">Item / Expense Name:</label>
                <input id="item-input" type="text" placeholder="e.g., Cookies">
            </div>

            <div class="field-row">
                <label for="amount-input">Amount Spent (₹):</label>
                <input id="amount-input" type="number" step="0.01" placeholder="0.00">
            </div>

            <button class="win-btn" onclick="saveSpending()">COMMIT TO DATABASE</button>

            <hr>

            <label id="ledger-title">Entries for Selected Day:</label>
            <div class="log-container" id="ledger-box"></div>
        </div>
    </div>

    <!-- SIDE CONSOLE COLUMN -->
    <div class="window-column">

        <!-- MONTHLY BREAKDOWN UTILITY -->
        <div class="window" style="width: 100%;">
            <div class="title-bar">
                <div class="title-bar-text">📊 BudgetGraph Dashboard</div>
            </div>

            <div class="window-body">
                <div class="field-row inline-fields">
                    <div>
                        <label for="filter-month">Month:</label>
                        <select id="filter-month" class="win-select" onchange="renderMonthlySummary()">
                            <option value="01">January</option>
                            <option value="02">February</option>
                            <option value="03">March</option>
                            <option value="04">April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div>
                        <label for="filter-year">Year:</label>
                        <select id="filter-year" class="win-select" onchange="renderMonthlySummary()">
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                        </select>
                    </div>
                </div>

                <label>Total Selected Month Budget Spend:</label>
                <div class="status-box" id="total-spend-box">₹0.00</div>

                <label>Daily Breakdown History:</label>
                <div class="log-container" id="monthly-summary-box"></div>
            </div>
        </div>

        <!-- ANNUAL CHART MODULE -->
        <div class="window" style="width: 100%;">
            <div class="title-bar" style="background: linear-gradient(90deg, #404040, #808080); color: #fff;">
                <div class="title-bar-text">📈 Annual Visual Analysis</div>
            </div>
            <div class="window-body">
                <div class="field-row">
                    <label for="chart-year">Select Tracked Year:</label>
                    <select id="chart-year" class="win-select" onchange="renderAnnualChart()">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                    </select>
                </div>

                <label>Monthly Spending Bar Profile:</label>
                <div class="chart-container" id="annual-chart-box"></div>
            </div>
        </div>

        <!-- PORTABILITY DISK UTILITY -->
        <div class="window" style="width: 100%;">
            <div class="title-bar" style="background: linear-gradient(90deg, #b5a4a4, #d8cccc); color: #000;">
                <div class="title-bar-text" style="font-weight: bold;">💾 Export and Save</div>
            </div>
            <div class="window-body">
                <label>Move Data to New PC:</label>
                <button class="win-btn" onclick="exportDataFile()">EXPORT TO BACKUP.TXT</button>

                <hr style="margin: 10px 0;">

                <label>Restore / Import Ledger File:</label>
                <input type="file" id="file-uploader" style="display: none;" onchange="importDataFile(event)">
                <button class="win-btn" style="margin-top:5px;"
                    onclick="document.getElementById('file-uploader').click()">LOAD BACKUP.TXT FROM DISK</button>
            </div>
        </div>

    </div>

    <script>
        const today = new Date();
        const localDateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('date-input').value = localDateStr;

        const currentMonthStr = String(today.getMonth() + 1).padStart(2, '0');
        const currentYearStr = String(today.getFullYear());

        document.getElementById('filter-month').value = currentMonthStr;
        document.getElementById('filter-year').value = currentYearStr;
        document.getElementById('chart-year').value = currentYearStr;

        function loadLedger() {
            const ledgerBox = document.getElementById('ledger-box');
            const selectedDate = document.getElementById('date-input').value;
            const ledgerTitle = document.getElementById('ledger-title');

            ledgerBox.innerHTML = '';
            ledgerTitle.textContent = `Entries for ${selectedDate || 'Selected Day'}:`;

            const history = JSON.parse(localStorage.getItem('dailySpendingDetailed')) || {};
            const dayEntries = history[selectedDate] || [];

            if (dayEntries.length === 0) {
                ledgerBox.innerHTML = '<div style="color: #808080; text-align:center; margin-top:60px;">[No Records For This Date]</div>';
                renderMonthlySummary();
                renderAnnualChart();
                return;
            }

            dayEntries.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                <span>${index + 1}. <strong>${entry.item}</strong></span>
                <span>₹${parseFloat(entry.amount).toFixed(2)} 
                    <button class="delete-btn" onclick="deleteEntry('${selectedDate}', ${index})">[X]</button>
                </span>
            `;
                ledgerBox.appendChild(div);
            });

            renderMonthlySummary();
            renderAnnualChart();
        }

        function renderMonthlySummary() {
            const targetMonth = document.getElementById('filter-month').value;
            const targetYear = document.getElementById('filter-year').value;
            const summaryBox = document.getElementById('monthly-summary-box');
            const totalBox = document.getElementById('total-spend-box');

            summaryBox.innerHTML = '';

            const history = JSON.parse(localStorage.getItem('dailySpendingDetailed')) || {};
            let runningMonthTotal = 0;
            const matchingDays = [];

            Object.keys(history).forEach(dateStr => {
                if (dateStr.startsWith(`${targetYear}-${targetMonth}`)) {
                    let daySum = 0;
                    history[dateStr].forEach(entry => {
                        daySum += parseFloat(entry.amount);
                    });

                    runningMonthTotal += daySum;

                    const parsedDate = new Date(dateStr);
                    const readableDate = parsedDate.toLocaleDateString('en-IN', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    });

                    matchingDays.push({
                        rawDate: dateStr,
                        label: readableDate,
                        total: daySum
                    });
                }
            });

            totalBox.textContent = `₹${runningMonthTotal.toFixed(2)}`;

            if (matchingDays.length === 0) {
                summaryBox.innerHTML = '<div style="color: #808080; text-align:center; margin-top:60px;">[No Spend Records Found]</div>';
                return;
            }

            matchingDays.sort((a, b) => a.rawDate.localeCompare(b.rawDate));

            matchingDays.forEach(day => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    document.getElementById('date-input').value = day.rawDate;
                    loadLedger();
                };
                div.innerHTML = `
                <span>📅 ${day.label}</span>
                <span style="color: #000080; font-weight: bold;">₹${day.total.toFixed(2)}</span>
            `;
                summaryBox.appendChild(div);
            });
        }

        function renderAnnualChart() {
            const targetYear = parseInt(document.getElementById('chart-year').value, 10);
            const chartBox = document.getElementById('annual-chart-box');
            chartBox.innerHTML = '';

            const history = JSON.parse(localStorage.getItem('dailySpendingDetailed')) || {};

            const monthlyTotals = Array(12).fill(0);
            const monthLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            let dataFound = false;

            Object.keys(history).forEach(dateStr => {
                if (dateStr.startsWith(targetYear.toString())) {
                    const monthIndex = parseInt(dateStr.split('-')[1], 10) - 1;
                    history[dateStr].forEach(entry => {
                        monthlyTotals[monthIndex] += parseFloat(entry.amount);
                        dataFound = true;
                    });
                }
            });

            // Determine how many months to show based on system calendar date context
            const sysDate = new Date();
            const sysYear = sysDate.getFullYear();
            const sysMonthIndex = sysDate.getMonth(); // 0 = Jan, 6 = July

            let maxVisibleMonths = 12;
            if (targetYear === sysYear) {
                maxVisibleMonths = sysMonthIndex + 1; // Limit visibility to current month
            } else if (targetYear > sysYear) {
                maxVisibleMonths = 0; // Hide completely for future years
            }

            if (!dataFound || maxVisibleMonths === 0) {
                chartBox.innerHTML = '<div style="color: #808080; width: 100%; text-align:center; line-height: 160px;">[No Data Logs For Year]</div>';
                return;
            }

            // Calculate peak amount within the restricted viewport
            const visibleTotals = monthlyTotals.slice(0, maxVisibleMonths);
            const absoluteYearlyMax = Math.max(...visibleTotals);

            for (let index = 0; index < maxVisibleMonths; index++) {
                const total = monthlyTotals[index];
                const barWrapper = document.createElement('div');
                barWrapper.className = 'chart-bar-wrapper';
                barWrapper.title = `${monthLabels[index]} ${targetYear}: ₹${total.toFixed(2)}`;

                const pct = absoluteYearlyMax > 0 ? (total / absoluteYearlyMax) * 80 : 0;
                const displayAmt = total > 0 ? `₹${Math.round(total)}` : '₹0';

                // Clean look: always use standard blue theme gradient for all active bars
                barWrapper.innerHTML = `
                <div style="font-size: 8px; margin-bottom: 2px; white-space: nowrap;">${total > 0 ? displayAmt : ''}</div>
                <div class="chart-bar" style="height: ${pct}%; background: linear-gradient(to right, #000080, #1084d0);"></div>
                <div class="chart-label" style="font-weight: ${total > 0 ? 'bold' : 'normal'}">${monthLabels[index]}</div>
            `;
                chartBox.appendChild(barWrapper);
            }
        }

        function saveSpending() {
            const dateInput = document.getElementById('date-input').value;
            const itemInput = document.getElementById('item-input').value.trim();
            const amountInput = document.getElementById('amount-input').value;

            if (!dateInput || !itemInput || !amountInput || amountInput <= 0) {
                alert("Error: Please provide valid date, label description, and amount.");
                return;
            }

            const history = JSON.parse(localStorage.getItem('dailySpendingDetailed')) || {};

            if (!history[dateInput]) {
                history[dateInput] = [];
            }

            history[dateInput].push({
                item: itemInput,
                amount: parseFloat(amountInput)
            });

            localStorage.setItem('dailySpendingDetailed', JSON.stringify(history));

            document.getElementById('item-input').value = '';
            document.getElementById('amount-input').value = '';
            loadLedger();
        }

        function deleteEntry(date, index) {
            const history = JSON.parse(localStorage.getItem('dailySpendingDetailed')) || {};
            if (history[date]) {
                history[date].splice(index, 1);
                if (history[date].length === 0) {
                    delete history[date];
                }
                localStorage.setItem('dailySpendingDetailed', JSON.stringify(history));
            }
            loadLedger();
        }

        function exportDataFile() {
            const dataStr = localStorage.getItem('dailySpendingDetailed') || "{}";
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', 'spend_backup.txt');
            linkElement.click();
        }

        function importDataFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (typeof parsedData === 'object' && parsedData !== null) {
                        localStorage.setItem('dailySpendingDetailed', JSON.stringify(parsedData));
                        alert("System registry successfully updated.");
                        loadLedger();
                    } else {
                        alert("Error: File payload invalid.");
                    }
                } catch (err) {
                    alert("Critical Error: Core format corrupted.");
                }
            };
            reader.readAsText(file);
        }

        loadLedger();
    </script>

</body>

</html>
